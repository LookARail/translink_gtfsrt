name: Update GTFS Static Data

on:
  # Run daily at 8 AM UTC (3 AM EST Toronto time, accounting for EST/EDT)
  schedule:
    - cron: '0 8 * * *'
  
  # Allow manual triggering from Actions tab
  workflow_dispatch:

jobs:
  process-gtfs:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow pushing processed files
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: scripts
        run: npm install
      
      - name: Process GTFS data
        working-directory: scripts
        run: node process-gtfs.js
      
      - name: Check for changes
        id: check_changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push processed data
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: update GTFS static data [automated]"
          git push
      
      - name: No changes detected
        if: steps.check_changes.outputs.changes == 'false'
        run: echo "No changes in GTFS data, skipping commit"
